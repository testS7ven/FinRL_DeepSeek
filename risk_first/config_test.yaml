# Config rapide pour valider le pipeline (test smoke)
# Réduit drastiquement epochs et steps pour finir en ~2 min

data:
  train_start: "2020-01-01"
  train_end:   "2021-12-31"
  test_start:  "2022-01-01"
  test_end:    "2022-12-31"
  initial_cash: 1_000_000
  hmax: 100
  indicators:
    - macd
    - rsi_30
    - cci_30
    - dx_30

signals:
  model:         "deepseek-ai/DeepSeek-V3"
  base_url:      "https://api.deepinfra.com/v1/openai"
  n_consistency: 3
  batch_size:    5
  temperature:   0.0
  cache_dir:     "risk_first/cache/signals"

env:
  reward_scaling:         1.0e-4
  use_confidence:         false
  use_reward_shaping:     false
  use_circuit_breaker:    false
  lambda_risk:            0.02
  cb_risk_threshold:      4.0
  cb_sentiment_threshold: 2.0

training:
  epochs:          3        # 3 au lieu de 100
  steps_per_epoch: 500      # 500 au lieu de 20000
  gamma:           0.995
  lam:             0.97
  clip_ratio:      0.7
  target_kl:       0.35
  pi_lr:           3.0e-5
  vf_lr:           1.0e-4
  train_pi_iters:  10       # 10 au lieu de 100
  train_v_iters:   10
  hidden_sizes:    [64, 64] # réseau plus petit pour la vitesse
  seed:            42

cppo:
  alpha:           0.85
  beta:            3000.0
  cvar_clip_ratio: 0.8
  delay:           1.0

eval:
  benchmark: "QQQ"
  cvar_alpha: 0.05
